<!DOCTYPE html>
<html lang="en" data-real-title="OurNetflix 🍿">

    <meta charset="UTF-8">

        <!-- album cards rendered here by gallery.js -->

    <section id="opened" class="opened" aria-label="Opened albums">
        <!-- expanded album sections render here -->

        <p>moonvault · ours only 💕</p>
